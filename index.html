<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>

<body>

<h2>Student Registration</h2>

<form id="studentForm">

    <input
        type="text"
        id="name"
        placeholder="Student Name"
        required>

    <br><br>

    <input
        type="text"
        id="reg"
        placeholder="Registration Number"
        required>

    <br><br>

    <input
        type="text"
        id="course"
        placeholder="Course"
        required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
